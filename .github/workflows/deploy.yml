name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never let two deploys overlap.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # `pnpm build` runs `tsgo --noEmit` before rspack, but the per-file CSS
      # module typings (*.module.d.css.ts) are emitted by cssModulesDtsLoader
      # *during* rspack, and the prod build has no TsCheckerRspackPlugin. On a
      # clean checkout the typings don't exist yet, so run rspack first to emit
      # them, then typecheck against them.
      - name: Build
        run: |
          pnpm build:proto
          pnpm sync-language-files
          DEPLOYMENT=www pnpm exec rspack build --config rspack.config.ts
          pnpm exec tsgo --noEmit -p .

      - name: Upload sourcemaps to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        run: pnpm sentry-sourcemaps

      - name: Deploy to fm6
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '21122' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --stats \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT" \
            dist/ "freemap@$DEPLOY_HOST:www/"
