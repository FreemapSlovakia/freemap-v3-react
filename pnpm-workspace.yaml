allowBuilds:
  "@parcel/watcher": true
  "@sentry/cli": true
  '@swc/core': true
  core-js-pure: true
  deasync: true
  esbuild: true
  exifreader: true
  protobufjs: true
  react-best-gradient-color-picker: true
minimumReleaseAgeExclude:
  - '@rspack/plugin-react-refresh@2.0.1'
  - '@sentry-internal/browser-utils@10.55.0'
  - '@sentry-internal/feedback@10.55.0'
  - '@sentry-internal/replay-canvas@10.55.0'
  - '@sentry-internal/replay@10.55.0'
  - '@sentry/browser@10.55.0'
  - '@sentry/core@10.55.0'
  - html-rspack-plugin@6.1.9
  - ts-checker-rspack-plugin@1.3.1
