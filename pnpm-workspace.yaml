allowBuilds:
  "@parcel/watcher": true
  "@sentry/cli": true
  "@swc/core": true
  core-js-pure: true
  deasync: true
  esbuild: true
  exifreader: true
  protobufjs: true

# Reject dependency versions published within the last day (in minutes). Guards
# against a compromised just-published release before the community catches it,
# and keeps local resolution in sync with the GitHub runner's frozen-lockfile
# supply-chain check.
minimumReleaseAge: 1440

# Approved exceptions: freshly-published versions we deliberately accept before
# they age past the cutoff. Keep only entries still younger than a day — once a
# version ages out, its entry is dead clutter and can be dropped. Use at most one
# entry per package (pnpm folds multiple same-name entries into a version union,
# which has mishandled the newest member).
minimumReleaseAgeExclude:
  - react-dropzone@17.0.0
  - tsx@4.23.1
